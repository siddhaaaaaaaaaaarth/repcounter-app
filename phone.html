<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Workout Tracker — phone preview</title>
<style>
  html, body {
    margin: 0; height: 100%;
    background: radial-gradient(120% 120% at 50% 0%, #15171c, #08090b 70%);
    display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  /* OnePlus Nord CE4: 1080x2412 @ ~2.75 dpr  ->  ~393 x 877 CSS px */
  .phone {
    position: relative;
    width: 393px; height: 877px;
    background: #050506;
    border-radius: 46px;
    padding: 11px;
    box-shadow: 0 40px 90px rgba(0,0,0,.7), 0 0 0 2px #2b2d33, inset 0 0 0 2px #000;
  }
  .screen {
    position: relative;
    width: 100%; height: 100%;
    border-radius: 36px;
    overflow: hidden;
    background: #0e1014;
  }
  .screen iframe { width: 100%; height: 100%; border: 0; display: block; }
  /* centered punch-hole camera */
  .cam {
    position: absolute; z-index: 3;
    top: 14px; left: 50%; transform: translateX(-50%);
    width: 11px; height: 11px; border-radius: 50%;
    background: #000; box-shadow: 0 0 0 2px #16181d;
  }
  .label {
    position: absolute; left: 0; right: 0; bottom: -30px;
    text-align: center; color: #6b7079; font-size: 12px; letter-spacing: .02em;
  }
</style>
</head>
<body>
  <div class="phone">
    <div class="screen">
      <div class="cam"></div>
      <iframe id="app" title="Workout Tracker"></iframe>
    </div>
    <div class="label">OnePlus Nord CE4 — 393 × 877</div>
  </div>
  <script>
    // cache-bust so the frame always shows the latest build during development
    document.getElementById("app").src = "index.html?preview=" + Date.now();
  </script>
</body>
</html>
