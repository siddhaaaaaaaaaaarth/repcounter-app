<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Workout Tracker</title>

<!-- PWA / install -->
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#0e1014" />
<link rel="icon" href="icons/icon-192.png" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Workouts" />

<style>
  :root {
    --bg:       #0e1014;
    --panel:    #181b22;
    --panel-2:  #1f232c;
    --border:   #2a2f3a;
    --text:     #e6e8ec;
    --muted:    #8b909a;
    --accent:   #4f8cff;
    --drop:     #f59e0b;
    --danger:   #ef4444;
    --radius:   14px;
    --safe-t:   env(safe-area-inset-top, 0px);
    --safe-b:   env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 15px;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior-y: none;
  }

  button, input { font-family: inherit; }
  button { user-select: none; }

  .wrap {
    max-width: 760px;
    margin: 0 auto;
    padding: calc(14px + var(--safe-t)) 16px calc(90px + var(--safe-b));
  }

  /* ===================== shared top bar ===================== */
  .appbar {
    position: sticky;
    top: 0;
    z-index: 20;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: calc(12px + var(--safe-t)) 16px 12px;
    background: linear-gradient(var(--bg) 78%, rgba(14,16,20,0));
    margin: calc(-14px - var(--safe-t)) -16px 8px;
  }
  .appbar .grow { flex: 1; min-width: 0; }

  .back-btn {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 15px;
    font-weight: 600;
    padding: 9px 14px 9px 11px;
    border-radius: 999px;
    cursor: pointer;
    white-space: nowrap;
  }
  .back-btn:active { background: var(--panel-2); }

  h1.title {
    font-size: 22px;
    font-weight: 700;
    margin: 0;
  }

  .unit-toggle {
    display: inline-flex;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 999px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .unit-toggle button {
    background: transparent;
    border: none;
    color: var(--muted);
    padding: 8px 14px;
    font-size: 13px;
    cursor: pointer;
    font-weight: 700;
  }
  .unit-toggle button.active { background: var(--accent); color: #fff; }

  /* ===================== HOME (workout menu) ===================== */
  .home-sub {
    color: var(--muted);
    font-size: 13px;
    margin: 2px 2px 16px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);   /* 2 across -> 3 rows of 2 on a phone */
    gap: 14px;
  }

  .card {
    position: relative;
    background-color: var(--panel);
    background-image:
      radial-gradient(135% 110% at 100% 0%, color-mix(in srgb, var(--c) 20%, transparent), transparent 55%),
      linear-gradient(160deg, rgba(255,255,255,.035), rgba(255,255,255,0) 60%);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 15px;
    cursor: pointer;
    aspect-ratio: 1 / 1;                      /* square tiles */
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 6px 18px rgba(0,0,0,.28);
    transition: transform .1s ease, box-shadow .15s ease, border-color .15s ease;
    -webkit-user-select: none; user-select: none;
  }
  .card:active { transform: scale(.96); }
  @media (hover: hover) {
    .card:hover {
      border-color: color-mix(in srgb, var(--c) 55%, var(--border));
      box-shadow: 0 12px 28px rgba(0,0,0,.38);
    }
  }

  .card .ic {
    width: 46px; height: 46px;
    border-radius: 13px;
    display: flex; align-items: center; justify-content: center;
    color: var(--c);
    background: color-mix(in srgb, var(--c) 18%, transparent);
    box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--c) 32%, transparent);
  }
  .card .ic svg { width: 25px; height: 25px; }
  .card .spacer { flex: 1 1 auto; }
  .card .card-name {
    font-size: 17px;
    font-weight: 700;
    line-height: 1.2;
    letter-spacing: -.01em;
    word-break: break-word;
  }
  .card .card-sub {
    color: var(--muted);
    font-size: 12px;
    margin-top: 4px;
  }
  .card .chev { position: absolute; top: 15px; right: 13px; color: var(--muted); opacity: .45; }

  .card.add {
    align-items: center;
    justify-content: center;
    gap: 10px;
    background-image: none;
    border: 1.5px dashed var(--border);
    box-shadow: none;
    color: var(--accent);
    font-weight: 700;
    font-size: 14px;
  }
  .card.add .plus {
    width: 44px; height: 44px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: color-mix(in srgb, var(--accent) 16%, transparent);
    font-size: 28px; font-weight: 300; line-height: 1;
  }
  .card.add:active { transform: scale(.96); border-color: var(--accent); }

  .empty {
    text-align: center;
    color: var(--muted);
    padding: 60px 20px;
  }
  .empty .big {
    font-size: 17px;
    color: var(--text);
    margin-bottom: 6px;
  }

  /* ===================== DAY DETAIL ===================== */
  .day-name {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--text);
    font-size: 27px;
    font-weight: 700;
    padding: 2px 2px 6px;
    margin-bottom: 14px;
  }
  .day-name:focus { outline: none; border-bottom-color: var(--accent); }

  .exercise {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 12px 10px;
    margin-bottom: 14px;
  }
  .ex-head { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .ex-name {
    flex: 1;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 9px;
    color: var(--text);
    font-size: 16px;
    font-weight: 600;
    padding: 11px 12px;
    min-width: 0;
  }
  .ex-name:focus { outline: none; border-color: var(--accent); }

  table.sets { width: 100%; border-collapse: collapse; }
  table.sets th {
    text-align: left;
    font-size: 11px;
    letter-spacing: .07em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 700;
    padding: 2px 5px 6px;
  }
  table.sets td { padding: 3px 5px; vertical-align: middle; }

  .col-label { width: 56px; }
  .col-num   { width: 34%; }
  .col-act   { width: 84px; text-align: right; }

  .set-label { color: var(--muted); font-weight: 800; font-size: 15px; font-variant-numeric: tabular-nums; }
  .drop-label { color: var(--drop); font-weight: 800; font-size: 12px; white-space: nowrap; }

  input.num {
    width: 100%;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 9px;
    color: var(--text);
    font-size: 16px;            /* 16px stops iOS zoom-on-focus */
    padding: 10px 8px;
    text-align: center;
    font-variant-numeric: tabular-nums;
  }
  input.num:focus { outline: none; border-color: var(--accent); }
  input.num::-webkit-outer-spin-button,
  input.num::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  input.num { -moz-appearance: textfield; }

  tr.drop .drop-cell { border-left: 3px solid var(--drop); padding-left: 8px; }
  tr.drop input.num { background: #20232b; }

  .icon-btn {
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 17px;
    line-height: 1;
    padding: 8px;
    border-radius: 8px;
  }
  .icon-btn:active { background: var(--panel-2); }
  .icon-btn.danger:active { color: var(--danger); }

  .add-drop {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--drop);
    border-radius: 8px;
    font-size: 12px;
    font-weight: 700;
    padding: 7px 8px;
    cursor: pointer;
    white-space: nowrap;
  }
  .add-drop:active { background: var(--panel-2); }

  .text-btn {
    background: transparent;
    border: 1px dashed var(--border);
    color: var(--muted);
    border-radius: 9px;
    padding: 9px 12px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
  }
  .text-btn:active { color: var(--text); border-color: var(--accent); }

  .add-exercise {
    display: block;
    width: 100%;
    background: transparent;
    border: 1px dashed var(--border);
    color: var(--accent);
    border-radius: var(--radius);
    padding: 15px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 4px;
  }
  .add-exercise:active { background: var(--panel); }

  /* ===================== save / export / toast ===================== */
  .pill-btn {
    background: var(--accent);
    border: none;
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    padding: 9px 16px;
    border-radius: 999px;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .pill-btn:active { transform: scale(.96); }
  .pill-btn.ghost {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
  }

  .toast {
    position: fixed;
    left: 50%;
    bottom: calc(24px + var(--safe-b));
    transform: translateX(-50%) translateY(18px);
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 14px;
    font-weight: 600;
    padding: 12px 18px;
    border-radius: 999px;
    box-shadow: 0 8px 28px rgba(0,0,0,.45);
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s ease, transform .2s ease;
    z-index: 100;
    max-width: 90%;
    text-align: center;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .file-row {
    color: var(--muted);
    font-size: 12px;
    line-height: 1.5;
    margin: -8px 2px 16px;
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .file-row b { color: var(--text); font-weight: 600; }
  .link-btn {
    background: none; border: none;
    color: var(--accent); font-size: 12px; font-weight: 700;
    cursor: pointer; padding: 2px;
  }
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
(function () {
  "use strict";

  var KEY = "workout-tracker-v1";
  var uid = function () { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); };

  // ---------- state ----------
  var state = load();
  var view = "home";        // "home" | "day"  (navigation is per-session)
  var activeDayId = null;

  function load() {
    try {
      var raw = localStorage.getItem(KEY);
      if (raw) {
        var s = JSON.parse(raw);
        if (!s.unit) s.unit = "kg";
        if (!Array.isArray(s.days)) s.days = [];
        if (!Array.isArray(s.history)) s.history = [];
        return s;
      }
    } catch (e) {}
    // first launch: seed a couple of workouts so the menu isn't empty
    return {
      unit: "kg",
      history: [],
      days: [
        {
          id: uid(), name: "Push Day",
          exercises: [{
            id: uid(), name: "Bench Press",
            sets: [
              { id: uid(), reps: "10", weight: "60", drops: [] },
              { id: uid(), reps: "8",  weight: "70", drops: [ { id: uid(), reps: "6", weight: "50" } ] }
            ]
          }]
        },
        { id: uid(), name: "Pull Day", exercises: [] }
      ]
    };
  }

  function save() { try { localStorage.setItem(KEY, JSON.stringify(state)); } catch (e) {} }

  // ---------- lookups ----------
  function getDay(id)       { return state.days.find(function (d) { return d.id === id; }); }
  function getEx(day, id)   { return day.exercises.find(function (e) { return e.id === id; }); }
  function getSet(ex, id)   { return ex.sets.find(function (s) { return s.id === id; }); }
  function getDrop(set, id) { return set.drops.find(function (dr) { return dr.id === id; }); }
  function esc(v)          { return (v == null ? "" : String(v)).replace(/"/g, "&quot;"); }

  // every exercise name used anywhere -> autocomplete suggestions
  function allExerciseNames() {
    var seen = {};
    state.days.forEach(function (d) {
      d.exercises.forEach(function (e) { var n = (e.name || "").trim(); if (n) seen[n] = 1; });
    });
    return Object.keys(seen).sort();
  }

  var app = document.getElementById("app");

  // ---------- render ----------
  function render() {
    if (view === "day" && getDay(activeDayId)) renderDay(getDay(activeDayId));
    else { view = "home"; renderHome(); }
    save();
  }

  function unitToggleHTML() {
    return '<div class="unit-toggle" data-role="unit">' +
      '<button data-unit="kg" class="' + (state.unit === "kg" ? "active" : "") + '">kg</button>' +
      '<button data-unit="lb" class="' + (state.unit === "lb" ? "active" : "") + '">lb</button>' +
      '</div>';
  }

  function renderHome() {
    var html = '<div class="appbar">' +
      '<h1 class="title grow">Workouts</h1>' +
      unitToggleHTML() +
      '<button class="pill-btn ghost" data-action="export" title="Export to Excel">Export</button>' +
      '</div>';

    if (!state.days.length) {
      html += '<div class="empty">' +
        '<div class="big">No workouts yet</div>' +
        '<div>Create one to get started.</div>' +
        '<div class="grid" style="margin-top:22px">' +
          '<div class="card add" data-action="addDay"><span class="plus">+</span><span>New workout</span></div>' +
        '</div></div>';
      app.innerHTML = html;
      return;
    }

    var saved = state.history.length;
    html += '<div class="home-sub">Tap a workout to open it.' +
      (saved ? ' · ' + saved + (saved === 1 ? ' session saved' : ' sessions saved') : '') + '</div>';
    if (FSA) {
      html += fileHandle
        ? '<div class="file-row"><span>Saving to <b>' + esc(fileHandle.name) + '</b></span><button class="link-btn" data-action="relink">change file</button></div>'
        : '<div class="file-row"><span>Your first Save will ask where to keep your Excel file.</span><button class="link-btn" data-action="relink">choose now</button></div>';
    } else {
      html += '<div class="file-row"><span>This browser saves by downloading a copy each time.</span></div>';
    }
    var PALETTE = ["#4f8cff", "#34d399", "#f59e0b", "#a78bfa", "#f472b6", "#22d3ee"];
    var ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 7v10M3.5 9.5v5M17.5 7v10M20.5 9.5v5M6.5 12h11"/></svg>';
    var CHEV = '<svg class="chev" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>';
    html += '<div class="grid">';
    state.days.forEach(function (d, i) {
      var nEx = d.exercises.length;
      var nSets = d.exercises.reduce(function (a, e) { return a + e.sets.length; }, 0);
      var sub = nEx
        ? nEx + (nEx === 1 ? " exercise" : " exercises") + " · " + nSets + (nSets === 1 ? " set" : " sets")
        : "Empty";
      html += '<div class="card" data-action="openDay" data-day="' + d.id + '" style="--c:' + PALETTE[i % PALETTE.length] + '">' +
        CHEV +
        '<div class="ic">' + ICON + '</div>' +
        '<div class="spacer"></div>' +
        '<div class="card-name">' + esc(d.name || "Untitled") + '</div>' +
        '<div class="card-sub">' + sub + '</div>' +
        '</div>';
    });
    html += '<div class="card add" data-action="addDay"><span class="plus">+</span><span>New workout</span></div>';
    html += '</div>';
    app.innerHTML = html;
  }

  function renderDay(day) {
    var u = state.unit;

    var html = '<div class="appbar">' +
      '<button class="back-btn" data-action="home">‹ Back</button>' +
      '<span class="grow"></span>' +
      '<button class="pill-btn" data-action="save" data-day="' + day.id + '">Save</button>' +
      unitToggleHTML() +
      '<button class="icon-btn danger" data-action="delDay" data-day="' + day.id + '" title="Delete workout">🗑</button>' +
      '</div>';

    html += '<input class="day-name" data-kind="dayname" data-day="' + day.id + '" value="' + esc(day.name) + '" placeholder="Workout name" />';

    var dl = allExerciseNames();
    html += '<datalist id="exNames">' +
      dl.map(function (n) { return '<option value="' + esc(n) + '"></option>'; }).join("") +
      '</datalist>';

    day.exercises.forEach(function (ex) {
      html += '<div class="exercise">';
      html += '<div class="ex-head">' +
        '<input class="ex-name" list="exNames" data-kind="exname" data-ex="' + ex.id + '" value="' + esc(ex.name) + '" placeholder="Exercise name" />' +
        '<button class="icon-btn danger" data-action="delEx" data-ex="' + ex.id + '" title="Delete exercise">🗑</button>' +
        '</div>';

      html += '<table class="sets"><thead><tr>' +
        '<th class="col-label">Set</th><th class="col-num">Reps</th>' +
        '<th class="col-num">Weight (' + u + ')</th><th class="col-act"></th>' +
        '</tr></thead><tbody>';

      ex.sets.forEach(function (s, i) {
        html += '<tr>' +
          '<td class="set-label">' + (i + 1) + '</td>' +
          '<td><input class="num" type="number" inputmode="numeric" step="1" min="0" data-kind="set" data-field="reps" data-ex="' + ex.id + '" data-set="' + s.id + '" value="' + esc(s.reps) + '" /></td>' +
          '<td><input class="num" type="number" inputmode="decimal" step="0.5" min="0" data-kind="set" data-field="weight" data-ex="' + ex.id + '" data-set="' + s.id + '" value="' + esc(s.weight) + '" /></td>' +
          '<td class="col-act">' +
            '<button class="add-drop" data-action="addDrop" data-ex="' + ex.id + '" data-set="' + s.id + '" title="Add drop set">+ drop</button> ' +
            '<button class="icon-btn danger" data-action="delSet" data-ex="' + ex.id + '" data-set="' + s.id + '" title="Delete set">✕</button>' +
          '</td></tr>';

        s.drops.forEach(function (dr, di) {
          html += '<tr class="drop">' +
            '<td class="drop-label">↳ drop ' + (di + 1) + '</td>' +
            '<td class="drop-cell"><input class="num" type="number" inputmode="numeric" step="1" min="0" data-kind="drop" data-field="reps" data-ex="' + ex.id + '" data-set="' + s.id + '" data-drop="' + dr.id + '" value="' + esc(dr.reps) + '" /></td>' +
            '<td><input class="num" type="number" inputmode="decimal" step="0.5" min="0" data-kind="drop" data-field="weight" data-ex="' + ex.id + '" data-set="' + s.id + '" data-drop="' + dr.id + '" value="' + esc(dr.weight) + '" /></td>' +
            '<td class="col-act"><button class="icon-btn danger" data-action="delDrop" data-ex="' + ex.id + '" data-set="' + s.id + '" data-drop="' + dr.id + '" title="Delete drop set">✕</button></td>' +
          '</tr>';
        });
      });

      html += '</tbody></table>';
      html += '<button class="text-btn" data-action="addSet" data-ex="' + ex.id + '">+ Add set</button>';
      html += '</div>';
    });

    html += '<button class="add-exercise" data-action="addEx">+ Add exercise</button>';
    app.innerHTML = html;
  }

  // ---------- clicks ----------
  app.addEventListener("click", function (e) {
    // unit toggle (present in both views)
    var ub = e.target.closest('[data-role="unit"] button');
    if (ub) { state.unit = ub.dataset.unit; render(); return; }

    var btn = e.target.closest("[data-action]");
    if (!btn) return;
    var a = btn.dataset.action;
    var day = getDay(activeDayId);

    if (a === "home") { view = "home"; render(); }
    else if (a === "openDay") { activeDayId = btn.dataset.day; view = "day"; render(); }
    else if (a === "addDay") {
      var nd = { id: uid(), name: "", exercises: [] };
      state.days.push(nd);
      activeDayId = nd.id; view = "day"; render();
    }
    else if (a === "delDay") {
      if (!confirm("Delete this workout and everything in it?")) return;
      state.days = state.days.filter(function (d) { return d.id !== btn.dataset.day; });
      view = "home"; activeDayId = null; render();
    }
    else if (a === "addEx") {
      day.exercises.push({ id: uid(), name: "", sets: [ { id: uid(), reps: "", weight: "", drops: [] } ] });
      render();
    }
    else if (a === "delEx") {
      day.exercises = day.exercises.filter(function (x) { return x.id !== btn.dataset.ex; });
      render();
    }
    else if (a === "addSet") {
      getEx(day, btn.dataset.ex).sets.push({ id: uid(), reps: "", weight: "", drops: [] });
      render();
    }
    else if (a === "delSet") {
      var ex = getEx(day, btn.dataset.ex);
      ex.sets = ex.sets.filter(function (s) { return s.id !== btn.dataset.set; });
      render();
    }
    else if (a === "addDrop") {
      getSet(getEx(day, btn.dataset.ex), btn.dataset.set).drops.push({ id: uid(), reps: "", weight: "" });
      render();
    }
    else if (a === "delDrop") {
      var set = getSet(getEx(day, btn.dataset.ex), btn.dataset.set);
      set.drops = set.drops.filter(function (dr) { return dr.id !== btn.dataset.drop; });
      render();
    }
    else if (a === "save")   { saveSession(getDay(btn.dataset.day) || day); }
    else if (a === "export") { exportDownload(); }
    else if (a === "relink") { pickFile().then(function () { render(); toast("Saving to " + fileHandle.name); }).catch(function () {}); }
  });

  // ---------- field edits (update without re-render to keep focus) ----------
  app.addEventListener("input", function (e) {
    var t = e.target, kind = t.dataset.kind;
    if (!kind) return;
    var day = getDay(activeDayId);
    if (kind === "dayname") { var d = getDay(t.dataset.day); if (d) d.name = t.value; }
    else if (kind === "exname") { var ex = getEx(day, t.dataset.ex); if (ex) ex.name = t.value; }
    else if (kind === "set") { var s = getSet(getEx(day, t.dataset.ex), t.dataset.set); if (s) s[t.dataset.field] = t.value; }
    else if (kind === "drop") {
      var set = getSet(getEx(day, t.dataset.ex), t.dataset.set);
      var dr = getDrop(set, t.dataset.drop); if (dr) dr[t.dataset.field] = t.value;
    }
    save();
  });

  // ===================== Save session + export to Excel =====================
  var toastEl = document.createElement("div");
  toastEl.className = "toast";
  document.body.appendChild(toastEl);
  var toastTimer = null;
  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { toastEl.classList.remove("show"); }, 2800);
  }

  var enc = new TextEncoder();
  var crcTable = (function () {
    var t = [];
    for (var n = 0; n < 256; n++) { var c = n; for (var k = 0; k < 8; k++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1); t[n] = c >>> 0; }
    return t;
  })();
  function crc32(b) { var c = 0xFFFFFFFF; for (var i = 0; i < b.length; i++) c = crcTable[(c ^ b[i]) & 0xFF] ^ (c >>> 8); return (c ^ 0xFFFFFFFF) >>> 0; }

  // minimal store-only zip writer -> valid .xlsx without any library
  function zipStore(files) {
    var u16 = function (n) { return [n & 255, (n >>> 8) & 255]; };
    var u32 = function (n) { n >>>= 0; return [n & 255, (n >>> 8) & 255, (n >>> 16) & 255, (n >>> 24) & 255]; };
    var parts = [], central = [], offset = 0;
    files.forEach(function (f) {
      var name = enc.encode(f.name), data = f.data, crc = crc32(data), len = data.length;
      var lh = new Uint8Array([].concat(u32(0x04034b50), u16(20), u16(0), u16(0), u16(0), u16(0), u32(crc), u32(len), u32(len), u16(name.length), u16(0)));
      parts.push(lh, name, data);
      central.push(new Uint8Array([].concat(u32(0x02014b50), u16(20), u16(20), u16(0), u16(0), u16(0), u16(0), u32(crc), u32(len), u32(len), u16(name.length), u16(0), u16(0), u16(0), u16(0), u32(0), u32(offset))), name);
      offset += lh.length + name.length + data.length;
    });
    var cSize = central.reduce(function (a, b) { return a + b.length; }, 0);
    var end = new Uint8Array([].concat(u32(0x06054b50), u16(0), u16(0), u16(files.length), u16(files.length), u32(cSize), u32(offset), u16(0)));
    var all = parts.concat(central, [end]);
    var total = all.reduce(function (a, b) { return a + b.length; }, 0);
    var out = new Uint8Array(total), p = 0;
    all.forEach(function (b) { out.set(b, p); p += b.length; });
    return out;
  }

  function xe(s) { return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;"); }
  function numOrNull(v) { if (v === "" || v == null) return null; var n = Number(v); return isFinite(n) ? n : null; }
  function dateSerial(iso) { var p = iso.split("-"); return Math.floor((Date.UTC(+p[0], +p[1] - 1, +p[2]) - Date.UTC(1899, 11, 30)) / 86400000); }
  function todayISO() { var d = new Date(), m = String(d.getMonth() + 1).padStart(2, "0"), dd = String(d.getDate()).padStart(2, "0"); return d.getFullYear() + "-" + m + "-" + dd; }

  var STYLES_XML = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +
    '<styleSheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">' +
    '<numFmts count="1"><numFmt numFmtId="164" formatCode="yyyy\\-mm\\-dd"/></numFmts>' +
    '<fonts count="2"><font><sz val="11"/><name val="Calibri"/></font><font><b/><sz val="11"/><name val="Calibri"/></font></fonts>' +
    '<fills count="2"><fill><patternFill patternType="none"/></fill><fill><patternFill patternType="gray125"/></fill></fills>' +
    '<borders count="1"><border/></borders>' +
    '<cellStyleXfs count="1"><xf numFmtId="0" fontId="0" fillId="0" borderId="0"/></cellStyleXfs>' +
    '<cellXfs count="3"><xf numFmtId="0" fontId="0" fillId="0" borderId="0" xfId="0"/><xf numFmtId="0" fontId="1" fillId="0" borderId="0" xfId="0" applyFont="1"/><xf numFmtId="164" fontId="0" fillId="0" borderId="0" xfId="0" applyNumberFormat="1"/></cellXfs>' +
    '<cellStyles count="1"><cellStyle name="Normal" xfId="0" builtinId="0"/></cellStyles></styleSheet>';

  // one worksheet for one exercise: Date | Set | Reps | Weight, a blank row between days
  function sheetXml(sessions) {
    var b = '<row r="1">' +
      '<c r="A1" s="1" t="inlineStr"><is><t>Date</t></is></c>' +
      '<c r="B1" s="1" t="inlineStr"><is><t>Set</t></is></c>' +
      '<c r="C1" s="1" t="inlineStr"><is><t>Reps</t></is></c>' +
      '<c r="D1" s="1" t="inlineStr"><is><t>Weight</t></is></c></row>';
    var r = 2;
    sessions.forEach(function (day) {
      var serial = dateSerial(day.date);
      day.rows.forEach(function (row) {
        var c = '<row r="' + r + '"><c r="A' + r + '" s="2"><v>' + serial + '</v></c>';
        c += '<c r="B' + r + '"><v>' + row.set + '</v></c>';
        c += (row.reps == null ? '' : '<c r="C' + r + '"><v>' + row.reps + '</v></c>');
        c += (row.weight == null ? '' : '<c r="D' + r + '"><v>' + row.weight + '</v></c>');
        b += c + '</row>'; r++;
      });
      r++; // leave one blank row between days
    });
    return '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +
      '<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">' +
      '<sheetViews><sheetView workbookViewId="0"><pane ySplit="1" topLeftCell="A2" activePane="bottomLeft" state="frozen"/><selection pane="bottomLeft" activeCell="A2" sqref="A2"/></sheetView></sheetViews>' +
      '<sheetFormatPr defaultRowHeight="15"/>' +
      '<cols><col min="1" max="1" width="12" customWidth="1"/><col min="2" max="2" width="7" customWidth="1"/><col min="3" max="3" width="7" customWidth="1"/><col min="4" max="4" width="9" customWidth="1"/></cols>' +
      '<sheetData>' + b + '</sheetData></worksheet>';
  }

  function safeSheetName(name, used) {
    var n = name.replace(/[:\\\/?*\[\]]/g, " ").trim().slice(0, 31) || "Sheet";
    var base = n, i = 2;
    while (used[n.toLowerCase()]) { var suf = " " + i; n = base.slice(0, 31 - suf.length) + suf; i++; }
    used[n.toLowerCase()] = 1;
    return n;
  }

  // group every saved session's data by exercise name, ordered by date
  function buildExerciseMap() {
    var map = {}, order = [];
    var sorted = state.history.slice().sort(function (a, b) { return a.date < b.date ? -1 : a.date > b.date ? 1 : 0; });
    sorted.forEach(function (sess) {
      sess.exercises.forEach(function (ex) {
        var name = (ex.name || "").trim();
        if (!name) return;
        var rows = [], setNo = 0;
        ex.sets.forEach(function (s) {
          var rp = numOrNull(s.reps), wt = numOrNull(s.weight);
          var drops = (s.drops || []).filter(function (d) { return numOrNull(d.reps) != null || numOrNull(d.weight) != null; });
          if (rp == null && wt == null && !drops.length) return;
          if (!(rp == null && wt == null)) { setNo++; rows.push({ set: String(setNo), reps: rp, weight: wt }); }
          drops.forEach(function (d, di) { rows.push({ set: setNo + "." + (di + 1), reps: numOrNull(d.reps), weight: numOrNull(d.weight) }); });
        });
        if (!rows.length) return;
        if (!map[name]) { map[name] = []; order.push(name); }
        map[name].push({ date: sess.date, rows: rows });
      });
    });
    return { order: order, map: map };
  }

  function buildWorkbookBytes() {
    var agg = buildExerciseMap();
    if (!agg.order.length) return null;

    var used = {}, meta = [];
    agg.order.forEach(function (name, idx) {
      meta.push({ file: "sheet" + (idx + 1) + ".xml", rid: "rId" + (idx + 1), title: safeSheetName(name, used), xml: sheetXml(agg.map[name]) });
    });
    var styRid = "rId" + (meta.length + 1);

    var wb = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets>' +
      meta.map(function (m, i) { return '<sheet name="' + xe(m.title) + '" sheetId="' + (i + 1) + '" r:id="' + m.rid + '"/>'; }).join("") + '</sheets></workbook>';
    var wbRels = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">' +
      meta.map(function (m) { return '<Relationship Id="' + m.rid + '" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/' + m.file + '"/>'; }).join("") +
      '<Relationship Id="' + styRid + '" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/></Relationships>';
    var ct = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/>' +
      meta.map(function (m) { return '<Override PartName="/xl/worksheets/' + m.file + '" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>'; }).join("") +
      '<Override PartName="/xl/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.styles+xml"/></Types>';
    var rels = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>';

    var files = [
      { name: "[Content_Types].xml", data: enc.encode(ct) },
      { name: "_rels/.rels", data: enc.encode(rels) },
      { name: "xl/workbook.xml", data: enc.encode(wb) },
      { name: "xl/_rels/workbook.xml.rels", data: enc.encode(wbRels) },
      { name: "xl/styles.xml", data: enc.encode(STYLES_XML) }
    ];
    meta.forEach(function (m) { files.push({ name: "xl/worksheets/" + m.file, data: enc.encode(m.xml) }); });
    return zipStore(files);
  }

  function downloadBytes(bytes, name) {
    var blob = new Blob([bytes], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url; a.download = name;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function () { URL.revokeObjectURL(url); }, 1500);
  }

  function exportDownload() {
    var bytes = buildWorkbookBytes();
    if (!bytes) { toast("Nothing saved yet — log a session and tap Save."); return; }
    downloadBytes(bytes, "workout-log.xlsx");
    toast("Downloaded a copy of workout-log.xlsx");
  }

  // ---- one persistent file via File System Access API (Chrome/Edge incl. Android) ----
  var FSA = (typeof window.showSaveFilePicker === "function");
  var fileHandle = null;

  function idbReq(mode, fn) {
    return new Promise(function (res, rej) {
      var op = indexedDB.open("wt-fs", 1);
      op.onupgradeneeded = function () { op.result.createObjectStore("kv"); };
      op.onerror = function () { rej(op.error); };
      op.onsuccess = function () {
        try {
          var db = op.result, tx = db.transaction("kv", mode), r = fn(tx.objectStore("kv"));
          tx.oncomplete = function () { res(r && r.result); };
          tx.onerror = function () { rej(tx.error); };
        } catch (e) { rej(e); }
      };
    });
  }
  function idbGet(k) { return idbReq("readonly", function (st) { return st.get(k); }); }
  function idbSet(k, v) { return idbReq("readwrite", function (st) { st.put(v, k); return null; }); }

  async function pickFile() {
    fileHandle = await window.showSaveFilePicker({
      suggestedName: "workout-log.xlsx",
      types: [{ description: "Excel workbook", accept: { "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet": [".xlsx"] } }]
    });
    try { await idbSet("xlsxHandle", fileHandle); } catch (e) {}
    return fileHandle;
  }
  async function writeToFile(bytes) {
    var h = fileHandle || (await pickFile());
    if ((await h.queryPermission({ mode: "readwrite" })) !== "granted") {
      if ((await h.requestPermission({ mode: "readwrite" })) !== "granted") throw new Error("permission");
    }
    var w = await h.createWritable();
    await w.write(bytes);
    await w.close();
    return h.name;
  }

  if (FSA) {
    idbGet("xlsxHandle").then(function (h) { if (h) { fileHandle = h; if (view === "home") renderHome(); } }).catch(function () {});
  }

  function snapshotDay(day) {
    var exs = [];
    day.exercises.forEach(function (ex) {
      if (!(ex.name || "").trim()) return;
      var hasData = ex.sets.some(function (s) {
        return s.reps !== "" || s.weight !== "" || (s.drops || []).some(function (d) { return d.reps !== "" || d.weight !== ""; });
      });
      if (!hasData) return;
      exs.push({
        name: ex.name.trim(),
        sets: ex.sets.map(function (s) {
          return { reps: s.reps, weight: s.weight, drops: (s.drops || []).map(function (d) { return { reps: d.reps, weight: d.weight }; }) };
        })
      });
    });
    return exs;
  }

  async function saveSession(day) {
    if (!day) return;
    var exs = snapshotDay(day);
    if (!exs.length) { toast("Add some reps or weight first."); return; }
    var date = todayISO();
    // replace any earlier save of THIS workout on THIS day, so re-saving just updates it
    state.history = state.history.filter(function (s) { return !(s.date === date && s.dayId === day.id); });
    state.history.push({ id: uid(), date: date, dayId: day.id, dayName: day.name, exercises: exs });
    save();

    var bytes = buildWorkbookBytes();   // built from history -> no duplicates
    if (FSA) {
      try {
        var name = await writeToFile(bytes);
        toast("Saved " + (day.name || "workout") + " → " + name);
      } catch (e) {
        if (e && e.name === "AbortError") { toast("Pick a file to save into, then tap Save again."); return; }
        downloadBytes(bytes, "workout-log.xlsx");
        toast("Saved " + (day.name || "workout") + " (downloaded)");
      }
    } else {
      downloadBytes(bytes, "workout-log.xlsx");
      toast("Saved (downloaded — this browser can’t update a file in place)");
    }
  }

  // Android hardware back button -> go home instead of leaving the app
  window.addEventListener("popstate", function () {
    if (view === "day") { view = "home"; render(); history.pushState(null, ""); }
  });
  history.pushState(null, "");

  render();

  // ---------- register service worker (enables offline + install) ----------
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("sw.js").catch(function () {});
    });
  }
})();
</script>
</body>
</html>
